<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kimo Technology | كيمو تكنولوجي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .hidden { display: none; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .active-tab { border-bottom: 4px solid #fbbf24; color: #fbbf24; }
    </style>
</head>
<body class="bg-[#0f172a] text-gray-100 font-sans">

    <!-- Header -->
    <nav class="p-4 bg-[#1e293b] flex justify-between items-center shadow-2xl border-b border-gray-700">
        <div class="flex items-center gap-2">
            <i class="fas fa-bolt text-yellow-400 text-2xl"></i>
            <h1 class="text-2xl font-black uppercase">KIMO <span class="text-yellow-400">TECH</span></h1>
        </div>
        <div id="auth-status" class="flex items-center gap-4">
            <span id="user-balance" class="hidden bg-green-500/20 text-green-400 border border-green-500/50 px-3 py-1 rounded-full text-sm font-bold">0.00$</span>
            <button id="logout-btn" class="hidden text-red-400 text-sm">خروج</button>
        </div>
    </nav>

    <!-- Auth Section -->
    <div id="auth-section" class="max-w-md mx-auto mt-20 p-8 glass-card rounded-2xl shadow-2xl">
        <h2 class="text-2xl font-bold mb-8 text-center text-yellow-400">دخول / إنشاء حساب</h2>
        <button id="google-btn" class="w-full bg-white text-black font-bold py-3 rounded-xl mb-4 flex items-center justify-center gap-3 hover:bg-gray-200 transition">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="20"> الدخول بواسطة Google
        </button>
        <div class="relative flex py-4 items-center"><div class="flex-grow border-t border-gray-700"></div><span class="mx-4 text-gray-500 text-sm">أو</span><div class="flex-grow border-t border-gray-700"></div></div>
        <input id="email" type="email" placeholder="الإيميل" class="w-full bg-gray-800 p-4 rounded-xl mb-4 outline-none focus:border-yellow-400">
        <input id="password" type="password" placeholder="الباسورد" class="w-full bg-gray-800 p-4 rounded-xl mb-6 outline-none focus:border-yellow-400">
        <button id="email-login-btn" class="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-4 rounded-xl transition">دخول</button>
    </div>

    <!-- Main Content -->
    <div id="main-content" class="hidden">
        <!-- Admin Panel -->
        <div id="admin-panel" class="hidden p-6 bg-red-900/10 border-b border-red-500/30">
            <h3 class="text-xl font-bold mb-4 text-red-400">لوحة تحكم كيمو (إضافة خدمات)</h3>
            <div class="flex flex-wrap gap-4 mb-6">
                <input id="new-service-name" type="text" placeholder="اسم الخدمة" class="bg-gray-800 p-2 rounded border border-gray-700">
                <input id="new-service-price" type="number" step="0.01" placeholder="السعر بالدولار" class="bg-gray-800 p-2 rounded border border-gray-700">
                <select id="new-service-cat" class="bg-gray-800 p-2 rounded border border-gray-700">
                    <option value="kimosmm">KIMO SMM</option>
                    <option value="priemerkimo">PREMIUM</option>
                    <option value="videokimo">VIDEO</option>
                </select>
                <button onclick="addNewService()" class="bg-blue-600 px-6 py-2 rounded font-bold hover:bg-blue-700">إضافة</button>
            </div>
            <div id="admin-orders-list" class="grid gap-2 text-sm"><!-- طلبات الشحن هنا --></div>
        </div>

        <!-- Tabs -->
        <div class="flex justify-center gap-6 mt-8 mb-10 border-b border-gray-800 sticky top-16 bg-[#0f172a] z-40 p-2">
            <button onclick="switchTab('kimosmm')" id="tab-kimosmm" class="pb-3 px-4 font-bold active-tab">KIMO SMM</button>
            <button onclick="switchTab('priemerkimo')" id="tab-priemerkimo" class="pb-3 px-4 font-bold text-gray-500">PREMIUM</button>
            <button onclick="switchTab('videokimo')" id="tab-videokimo" class="pb-3 px-4 font-bold text-gray-500">VIDEO</button>
            <button onclick="switchTab('recharge')" id="tab-recharge" class="pb-3 px-4 font-bold text-green-500">شحن</button>
        </div>

        <!-- Grid -->
        <div id="services-grid" class="p-6 grid grid-cols-1 md:grid-cols-3 gap-6 max-w-7xl mx-auto"></div>

        <!-- Recharge -->
        <div id="recharge-section" class="hidden p-6 max-w-xl mx-auto">
            <div class="glass-card p-8 rounded-3xl border-t-4 border-yellow-500 text-center">
                <h3 class="text-2xl font-bold mb-2 text-yellow-400">اشحن رصيدك</h3>
                <p class="mb-4 text-gray-400 text-sm">سعر الدولار في الموقع ثابت على <span class="text-white font-bold">54 جنيه مصري</span></p>
                <div class="bg-gray-900 p-4 rounded-xl mb-6 border border-gray-700">
                    <span class="text-xl font-mono text-white">01112215950</span>
                </div>
                <input id="recharge-phone" type="text" placeholder="رقمك اللي بعت منه" class="w-full bg-gray-800 p-4 rounded-xl mb-4 outline-none border border-gray-700">
                <input id="recharge-egy" type="number" placeholder="المبلغ اللي بعته بالمصري" class="w-full bg-gray-800 p-4 rounded-xl mb-6 outline-none border border-gray-700">
                <button onclick="submitRecharge()" class="w-full bg-green-600 hover:bg-green-700 py-4 rounded-xl font-bold transition">إرسال طلب الشحن</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, addDoc, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB48E8FEkT2t_U9kUZYtWLJBxpCtMrAQZY",
            authDomain: "kimo-tecnology.firebaseapp.com",
            projectId: "kimo-tecnology",
            storageBucket: "kimo-tecnology.firebasestorage.app",
            messagingSenderId: "27878132504",
            appId: "1:27878132504:web:5559659d4a2342747cac6d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();
        const RATE = 54;
        const ADMIN = "kareemwael0213@gmail.com";
        const SHARK_API = "91bda800790531f970ca22fe776e2aa6";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                document.getElementById('logout-btn').classList.remove('hidden');
                document.getElementById('user-balance').classList.remove('hidden');
                if (user.email === ADMIN) {
                    document.getElementById('admin-panel').classList.remove('hidden');
                    loadAdminOrders();
                }
                switchTab('kimosmm');
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('main-content').classList.add('hidden');
            }
        });

        document.getElementById('google-btn').onclick = () => signInWithPopup(auth, googleProvider);
        document.getElementById('logout-btn').onclick = () => signOut(auth);

        window.switchTab = (tab) => {
            ['kimosmm', 'priemerkimo', 'videokimo', 'recharge'].forEach(t => document.getElementById(`tab-${t}`).classList.remove('active-tab'));
            document.getElementById(`tab-${tab}`).classList.add('active-tab');
            if (tab === 'recharge') {
                document.getElementById('services-grid').classList.add('hidden');
                document.getElementById('recharge-section').classList.remove('hidden');
            } else {
                document.getElementById('services-grid').classList.remove('hidden');
                document.getElementById('recharge-section').classList.add('hidden');
                loadServices(tab);
            }
        };

        async function loadServices(cat) {
            const q = query(collection(db, "services"), where("category", "==", cat));
            onSnapshot(q, (snap) => {
                const grid = document.getElementById('services-grid');
                grid.innerHTML = '';
                snap.forEach(d => {
                    const s = d.data();
                    const egyPrice = (s.price * RATE).toFixed(2);
                    grid.innerHTML += `
                        <div class="glass-card p-6 rounded-2xl hover:border-yellow-500 transition border border-gray-800">
                            <h4 class="text-xl font-bold mb-2">${s.name}</h4>
                            <div class="mb-4">
                                <span class="text-yellow-400 text-2xl font-bold">${s.price}$</span>
                                <span class="text-gray-500 text-sm block">أو ${egyPrice} جنيه</span>
                            </div>
                            <button onclick="orderService('${d.id}', ${s.price})" class="w-full bg-blue-600 py-2 rounded-lg font-bold hover:bg-blue-700">اطلب الآن</button>
                        </div>`;
                });
            });
        }

        window.addNewService = async () => {
            const name = document.getElementById('new-service-name').value;
            const price = parseFloat(document.getElementById('new-service-price').value);
            const category = document.getElementById('new-service-cat').value;
            if(!name || !price) return alert("املا بيانات الخدمة");
            await addDoc(collection(db, "services"), { name, price, category });
            alert("تمت إضافة الخدمة بنجاح!");
        };

        window.submitRecharge = async () => {
            const egy = document.getElementById('recharge-egy').value;
            const phone = document.getElementById('recharge-phone').value;
            if(!egy || !phone) return alert("اكتب المبلغ والرقم!");
            await addDoc(collection(db, "recharge_requests"), {
                email: auth.currentUser.email,
                egyAmount: egy,
                phone: phone,
                dollarValue: (egy / RATE).toFixed(2),
                status: "pending"
            });
            alert("تم إرسال الطلب، كيمو هيراجع ويشحنلك");
        };

        function loadAdminOrders() {
            onSnapshot(collection(db, "recharge_requests"), (snap) => {
                const list = document.getElementById('admin-orders-list');
                list.innerHTML = '';
                snap.forEach(d => {
                    const r = d.data();
                    list.innerHTML += `<div class="bg-gray-800 p-2 rounded mb-1">المستخدم: ${r.email} | بعت: ${r.egyAmount} جنيه (تساوي ${r.dollarValue}$) | من رقم: ${r.phone}</div>`;
                });
            });
        }
    </script>
</body>
</html>
