<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kimo Technology | كيمو تكنولوجي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <style>
        .hidden { display: none; }
        .active-tab { border-bottom: 3px solid #facc15; color: #facc15; }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans">

    <!-- Navbar -->
    <nav class="p-4 bg-gray-800 flex justify-between items-center shadow-lg">
        <h1 class="text-2xl font-bold text-yellow-400">Kimo Tech</h1>
        <div id="user-info" class="flex items-center gap-4">
            <span id="user-balance" class="bg-green-600 px-3 py-1 rounded-full text-sm">رصيدك: 0$</span>
            <button id="login-btn" class="bg-yellow-500 hover:bg-yellow-600 text-black px-4 py-2 rounded-lg font-bold">تسجيل دخول Google</button>
            <button id="logout-btn" class="hidden text-red-400">خروج</button>
        </div>
    </nav>

    <!-- Admin Panel (Only for Kareem) -->
    <div id="admin-section" class="hidden p-6 bg-red-900/20 border-b border-red-500">
        <h2 class="text-xl mb-4 font-bold">لوحة تحكم كيمو (الآدمن)</h2>
        <div class="flex gap-4 flex-wrap">
            <input id="service-name" type="text" placeholder="اسم الخدمة" class="bg-gray-700 p-2 rounded">
            <input id="service-price" type="number" placeholder="السعر" class="bg-gray-700 p-2 rounded">
            <select id="service-cat" class="bg-gray-700 p-2 rounded">
                <option value="kimosmm">kimosmm</option>
                <option value="priemerkimo">priemerkimo</option>
                <option value="videokimo">videokimo</option>
            </select>
            <button onclick="addService()" class="bg-blue-600 px-4 py-2 rounded">إضافة خدمة</button>
        </div>
    </div>

    <!-- Main Content -->
    <main class="p-6">
        <!-- Tabs -->
        <div class="flex justify-center gap-8 mb-8 border-b border-gray-700">
            <button onclick="showTab('kimosmm')" id="tab-kimosmm" class="pb-2 active-tab">kimosmm</button>
            <button onclick="showTab('priemerkimo')" id="tab-priemerkimo" class="pb-2">priemerkimo</button>
            <button onclick="showTab('videokimo')" id="tab-videokimo" class="pb-2">videokimo</button>
            <button onclick="showTab('recharge')" id="tab-recharge" class="pb-2 text-green-400">شحن رصيد</button>
        </div>

        <!-- Services Display -->
        <div id="services-container" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- سيتم تحميل الخدمات هنا ديناميكياً -->
        </div>

        <!-- Recharge Section -->
        <div id="recharge-container" class="hidden max-w-md mx-auto bg-gray-800 p-6 rounded-xl border border-yellow-500">
            <h3 class="text-xl mb-4">شحن رصيد (فودافون كاش)</h3>
            <p class="mb-4 text-sm text-gray-400">ارسل الفلوس لـ: <span class="text-yellow-400">01112215950</span></p>
            <input id="amount" type="number" placeholder="المبلغ المبعوث" class="w-full bg-gray-700 p-3 mb-4 rounded">
            <input id="sender-num" type="text" placeholder="رقمك اللي بعت منه" class="w-full bg-gray-700 p-3 mb-4 rounded">
            <button onclick="requestRecharge()" class="w-full bg-green-600 p-3 rounded font-bold">إرسال طلب الشحن</button>
        </div>
    </main>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, addDoc, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB48E8FEkT2t_U9kUZYtWLJBxpCtMrAQZY",
            authDomain: "kimo-tecnology.firebaseapp.com",
            projectId: "kimo-tecnology",
            storageBucket: "kimo-tecnology.firebasestorage.app",
            messagingSenderId: "27878132504",
            appId: "1:27878132504:web:5559659d4a2342747cac6d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;

        // Login Logic
        document.getElementById('login-btn').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('logout-btn').onclick = () => signOut(auth);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('login-btn').classList.add('hidden');
                document.getElementById('logout-btn').classList.remove('hidden');
                
                // التحقق لو كيمو هو اللي داخل
                if(user.email === "kareemwael0213@gmail.com") {
                    document.getElementById('admin-section').classList.remove('hidden');
                }

                // جلب الرصيد
                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);
                if (!userSnap.exists()) {
                    await setDoc(userRef, { email: user.email, balance: 0 });
                } else {
                    document.getElementById('user-balance').innerText = `رصيدك: ${userSnap.data().balance}$`;
                }
            } else {
                currentUser = null;
                document.getElementById('login-btn').classList.remove('hidden');
                document.getElementById('logout-btn').classList.add('hidden');
                document.getElementById('admin-section').classList.add('hidden');
            }
        });

        // Tabs Logic
        window.showTab = (tabName) => {
            const sections = ['services-container', 'recharge-container'];
            const tabs = ['kimosmm', 'priemerkimo', 'videokimo', 'recharge'];
            
            tabs.forEach(t => document.getElementById(`tab-${t}`).classList.remove('active-tab'));
            document.getElementById(`tab-${tabName}`).classList.add('active-tab');

            if(tabName === 'recharge') {
                document.getElementById('services-container').classList.add('hidden');
                document.getElementById('recharge-container').classList.remove('hidden');
            } else {
                document.getElementById('services-container').classList.remove('hidden');
                document.getElementById('recharge-container').classList.add('hidden');
                loadServices(tabName);
            }
        };

        // Load Services
        async function loadServices(category) {
            const q = query(collection(db, "services"), where("category", "==", category));
            onSnapshot(q, (snapshot) => {
                const container = document.getElementById('services-container');
                container.innerHTML = '';
                snapshot.forEach((doc) => {
                    const s = doc.data();
                    container.innerHTML += `
                        <div class="bg-gray-800 p-4 rounded-xl border border-gray-700">
                            <h4 class="text-lg font-bold">${s.name}</h4>
                            <p class="text-yellow-400">${s.price}$</p>
                            <button onclick="orderService('${doc.id}')" class="mt-4 w-full bg-blue-600 py-2 rounded">طلب الخدمة</button>
                        </div>
                    `;
                });
            });
        }

        // Add Service (Admin)
        window.addService = async () => {
            const name = document.getElementById('service-name').value;
            const price = document.getElementById('service-price').value;
            const category = document.getElementById('service-cat').value;
            await addDoc(collection(db, "services"), { name, price, category });
            alert("تمت إضافة الخدمة بنجاح!");
        };

        // Request Recharge
        window.requestRecharge = async () => {
            const amount = document.getElementById('amount').value;
            const num = document.getElementById('sender-num').value;
            if(!currentUser) return alert("سجل دخول الأول!");
            await addDoc(collection(db, "recharge_requests"), {
                uid: currentUser.uid,
                email: currentUser.email,
                amount,
                num,
                status: "pending"
            });
            alert("تم إرسال الطلب، كيمو هيراجع الفلوس ويزود رصيدك");
        };

        // Initial Load
        loadServices('kimosmm');

    </script>
</body>
</html>
