<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kimo Technology | كيمو تكنولوجي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .hidden { display: none; }
        .active-tab { border-bottom: 4px solid #fbbf24; color: #fbbf24; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        body { background: radial-gradient(circle at top right, #1e293b, #0f172a); min-height: 100vh; }
    </style>
</head>
<body class="text-gray-100 font-sans">

    <!-- Header -->
    <nav class="p-4 bg-[#1e293b]/80 backdrop-blur-md sticky top-0 z-50 flex justify-between items-center shadow-2xl border-b border-gray-700">
        <div class="flex items-center gap-2">
            <i class="fas fa-bolt text-yellow-400 text-2xl animate-pulse"></i>
            <h1 class="text-2xl font-black tracking-tighter uppercase">KIMO <span class="text-yellow-400">TECH</span></h1>
        </div>
        <div id="auth-status" class="flex items-center gap-4">
            <span id="user-balance" class="hidden bg-green-500/20 text-green-400 border border-green-500/50 px-4 py-1 rounded-full text-sm font-bold">0.00$</span>
            <button id="logout-btn" class="hidden text-red-400 hover:text-red-300 transition text-sm font-bold">خروج</button>
        </div>
    </nav>

    <!-- Auth Section -->
    <div id="auth-section" class="max-w-md mx-auto mt-20 p-8 glass-card rounded-3xl shadow-2xl">
        <h2 class="text-3xl font-bold mb-8 text-center text-yellow-400">مرحباً بك في كيمو</h2>
        
        <button id="google-btn" class="w-full bg-white text-black font-bold py-3 rounded-xl mb-4 flex items-center justify-center gap-3 hover:bg-gray-200 transition-all active:scale-95">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="20">
            الدخول بواسطة Google
        </button>

        <div class="relative flex py-4 items-center">
            <div class="flex-grow border-t border-gray-700"></div>
            <span class="flex-shrink mx-4 text-gray-500 text-sm">أو بالإيميل</span>
            <div class="flex-grow border-t border-gray-700"></div>
        </div>

        <input id="email" type="email" placeholder="البريد الإلكتروني" class="w-full bg-gray-800 border border-gray-700 p-4 rounded-xl mb-4 outline-none focus:border-yellow-400 transition">
        <input id="password" type="password" placeholder="كلمة المرور" class="w-full bg-gray-800 border border-gray-700 p-4 rounded-xl mb-6 outline-none focus:border-yellow-400 transition">
        <button id="email-login-btn" class="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-4 rounded-xl mb-3 shadow-lg shadow-yellow-500/20 transition-all active:scale-95">دخول / إنشاء حساب</button>
    </div>

    <!-- Main App Content -->
    <div id="main-content" class="hidden animate-in fade-in duration-700">
        <!-- Admin View (Orders) -->
        <div id="admin-panel" class="hidden p-6 bg-red-900/10 border-b border-red-500/30">
            <h3 class="text-xl font-bold mb-4 text-red-400 flex items-center gap-2">
                <i class="fas fa-user-shield"></i> لوحة تحكم الأدمن (طلبات الشحن)
            </h3>
            <div id="admin-orders-list" class="grid gap-3">
                <!-- Requests appear here -->
            </div>
        </div>

        <!-- Section Navigation -->
        <div class="flex justify-center gap-4 mt-8 mb-10 border-b border-gray-800 sticky top-16 bg-[#0f172a] z-40 p-2">
            <button onclick="switchTab('kimosmm')" id="tab-kimosmm" class="pb-3 px-6 font-bold active-tab transition-all">KIMO SMM</button>
            <button onclick="switchTab('priemerkimo')" id="tab-priemerkimo" class="pb-3 px-6 font-bold text-gray-500">PREMIUM</button>
            <button onclick="switchTab('videokimo')" id="tab-videokimo" class="pb-3 px-6 font-bold text-gray-500">VIDEO</button>
            <button onclick="switchTab('recharge')" id="tab-recharge" class="pb-3 px-6 font-bold text-green-500">شحن</button>
        </div>

        <!-- Services Grid -->
        <div id="services-grid" class="p-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 max-w-7xl mx-auto">
            <!-- Cards generated by JS -->
        </div>

        <!-- Recharge Section -->
        <div id="recharge-section" class="hidden p-6 max-w-xl mx-auto">
            <div class="glass-card p-10 rounded-3xl border-t-4 border-yellow-500">
                <h3 class="text-2xl font-bold mb-2 text-yellow-400">اشحن رصيدك الآن</h3>
                <p class="mb-8 text-gray-400">حول المبلغ لمحفظة فودافون كاش:</p>
                <div class="bg-gray-900 p-4 rounded-2xl mb-8 flex justify-between items-center border border-gray-700">
                    <span class="text-2xl font-mono text-white font-bold tracking-widest">01112215950</span>
                    <i class="fas fa-copy text-gray-500 cursor-pointer hover:text-yellow-400"></i>
                </div>
                <input id="recharge-amount" type="number" placeholder="المبلغ المبعوث" class="w-full bg-gray-800 border border-gray-700 p-4 rounded-xl mb-4">
                <input id="recharge-phone" type="text" placeholder="رقمك اللي بعت منه" class="w-full bg-gray-800 border border-gray-700 p-4 rounded-xl mb-8">
                <button onclick="submitRecharge()" class="w-full bg-green-600 hover:bg-green-700 py-4 rounded-xl font-bold shadow-lg shadow-green-900/20 transition-all">تأكيد الإرسال للأدمن</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendEmailVerification, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, addDoc, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB48E8FEkT2t_U9kUZYtWLJBxpCtMrAQZY",
            authDomain: "kimo-tecnology.firebaseapp.com",
            projectId: "kimo-tecnology",
            storageBucket: "kimo-tecnology.firebasestorage.app",
            messagingSenderId: "27878132504",
            appId: "1:27878132504:web:5559659d4a2342747cac6d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();

        let currentUser = null;
        const ADMIN_EMAIL = "kareemwael0213@gmail.com";

        // Auth Logic
        document.getElementById('google-btn').onclick = () => signInWithPopup(auth, googleProvider);

        document.getElementById('email-login-btn').onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            if(!email || !pass) return alert("املا البيانات!");

            try {
                const cred = await signInWithEmailAndPassword(auth, email, pass);
                if (!cred.user.emailVerified && email !== ADMIN_EMAIL) {
                    alert("فعل حسابك من اللينك اللي بعتناهولك على الإيميل.");
                    await signOut(auth);
                }
            } catch (err) {
                if (err.code === 'auth/invalid-credential' || err.code === 'auth/user-not-found') {
                    const newU = await createUserWithEmailAndPassword(auth, email, pass);
                    await sendEmailVerification(newU.user);
                    alert("تم إنشاء حسابك! روح فعل الإيميل عشان تدخل.");
                } else { alert("خطأ: " + err.message); }
            }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user && (user.emailVerified || user.email === ADMIN_EMAIL)) {
                currentUser = user;
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                document.getElementById('user-balance').classList.remove('hidden');
                document.getElementById('logout-btn').classList.remove('hidden');
                
                if (user.email === ADMIN_EMAIL) {
                    document.getElementById('admin-panel').classList.remove('hidden');
                    loadAdminOrders();
                }
                switchTab('kimosmm');
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('main-content').classList.add('hidden');
            }
        });

        document.getElementById('logout-btn').onclick = () => signOut(auth);

        // UI Tabs Logic
        window.switchTab = (tab) => {
            const tabs = ['kimosmm', 'priemerkimo', 'videokimo', 'recharge'];
            tabs.forEach(t => {
                document.getElementById(`tab-${t}`).classList.remove('active-tab');
                document.getElementById(`tab-${t}`).classList.add('text-gray-500');
            });
            document.getElementById(`tab-${tab}`).classList.add('active-tab');
            document.getElementById(`tab-${tab}`).classList.remove('text-gray-500');

            if (tab === 'recharge') {
                document.getElementById('services-grid').classList.add('hidden');
                document.getElementById('recharge-section').classList.remove('hidden');
            } else {
                document.getElementById('services-grid').classList.remove('hidden');
                document.getElementById('recharge-section').classList.add('hidden');
                loadServices(tab);
            }
        };

        async function loadServices(category) {
            const q = query(collection(db, "services"), where("category", "==", category));
            onSnapshot(q, (snap) => {
                const grid = document.getElementById('services-grid');
                grid.innerHTML = '';
                snap.forEach(d => {
                    const s = d.data();
                    grid.innerHTML += `
                        <div class="glass-card p-8 rounded-3xl border border-gray-800 hover:border-yellow-500/50 transition-all duration-300 group">
                            <div class="w-12 h-12 bg-yellow-500/10 rounded-xl flex items-center justify-center mb-6 text-yellow-400 group-hover:bg-yellow-500 group-hover:text-black transition-all">
                                <i class="fas fa-star"></i>
                            </div>
                            <h4 class="text-xl font-bold mb-2">${s.name}</h4>
                            <p class="text-gray-400 text-sm mb-6">خدمة سريعة وآمنة تماماً</p>
                            <div class="flex justify-between items-center">
                                <span class="text-2xl font-black text-yellow-400">${s.price}$</span>
                                <button onclick="orderService('${d.id}')" class="bg-gray-800 px-6 py-2 rounded-xl font-bold hover:bg-white hover:text-black transition-all">اطلب</button>
                            </div>
                        </div>`;
                });
            });
        }

        window.submitRecharge = async () => {
            const amount = document.getElementById('recharge-amount').value;
            const num = document.getElementById('recharge-phone').value;
            if(!amount || !num) return alert("كمل البيانات يا بطل");
            
            await addDoc(collection(db, "recharge_requests"), {
                uid: currentUser.uid,
                email: currentUser.email,
                amount,
                num,
                time: new Date()
            });
            alert("تم إرسال الطلب، كيمو هيراجع ويشحن لك رصيدك.");
        };

        async function loadAdminOrders() {
            onSnapshot(collection(db, "recharge_requests"), (snap) => {
                const list = document.getElementById('admin-orders-list');
                list.innerHTML = '';
                snap.forEach(d => {
                    const r = d.data();
                    list.innerHTML += `
                        <div class="bg-gray-800/50 p-4 rounded-2xl flex justify-between items-center border-r-4 border-yellow-500">
                            <div>
                                <p class="text-xs text-yellow-500 font-bold">${r.email}</p>
                                <p class="text-lg">رقم: ${r.num} | <span class="text-green-400">${r.amount}$</span></p>
                            </div>
                            <button class="bg-green-600 px-4 py-1 rounded-lg text-sm font-bold">شحن</button>
                        </div>`;
                });
            });
        }
    </script>
</body>
</html>
