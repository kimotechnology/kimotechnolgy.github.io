<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kimo Technology | كيمو تكنولوجي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .hidden { display: none; }
        .active-tab { border-bottom: 4px solid #fbbf24; color: #fbbf24; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="bg-[#0f172a] text-gray-100 font-sans">

    <!-- Header -->
    <nav class="p-4 bg-[#1e293b] flex justify-between items-center shadow-2xl border-b border-gray-700">
        <div class="flex items-center gap-2">
            <i class="fas fa-rocket text-yellow-400 text-2xl"></i>
            <h1 class="text-2xl font-black tracking-tighter">KIMO <span class="text-yellow-400">TECH</span></h1>
        </div>
        <div id="auth-status" class="flex items-center gap-4">
            <span id="user-balance" class="hidden bg-green-500/20 text-green-400 border border-green-500/50 px-3 py-1 rounded-full text-sm font-bold">0.00$</span>
            <button id="logout-btn" class="hidden text-red-400 hover:text-red-300 text-sm">خروج</button>
        </div>
    </nav>

    <!-- Auth Forms -->
    <div id="auth-section" class="max-w-md mx-auto mt-20 p-8 glass-card rounded-2xl">
        <h2 class="text-2xl font-bold mb-6 text-center">تسجيل الدخول / إنشاء حساب</h2>
        <input id="email" type="email" placeholder="البريد الإلكتروني" class="w-full bg-gray-800 border border-gray-700 p-3 rounded-lg mb-4 outline-none focus:border-yellow-400 transition">
        <input id="password" type="password" placeholder="كلمة المرور" class="w-full bg-gray-800 border border-gray-700 p-3 rounded-lg mb-6 outline-none focus:border-yellow-400 transition">
        <button id="login-btn" class="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-3 rounded-lg mb-3 transition">دخول / تسجيل</button>
        <p class="text-xs text-gray-400 text-center">سيتم إرسال رابط تفعيل لإيميلك إذا كنت مستخدم جديد.</p>
    </div>

    <!-- Main Content (Hidden until login) -->
    <div id="main-content" class="hidden">
        <!-- Admin Orders View (Only for Kareem) -->
        <div id="admin-panel" class="hidden p-6 bg-red-900/10 border-b border-red-500/30">
            <h3 class="text-xl font-bold mb-4 text-red-400"><i class="fas fa-user-shield ml-2"></i>طلبات العملاء (إدارة كيمو)</h3>
            <div id="admin-orders-list" class="grid gap-4">
                <!-- طلبات العملاء تظهر هنا -->
            </div>
        </div>

        <!-- Navigation Tabs -->
        <div class="flex justify-center gap-6 mt-8 mb-10 border-b border-gray-800 overflow-x-auto">
            <button onclick="switchTab('kimosmm')" id="tab-kimosmm" class="pb-4 px-4 font-bold active-tab">KIMO SMM</button>
            <button onclick="switchTab('priemerkimo')" id="tab-priemerkimo" class="pb-4 px-4 font-bold text-gray-400">PREMIUM</button>
            <button onclick="switchTab('videokimo')" id="tab-videokimo" class="pb-4 px-4 font-bold text-gray-400">VIDEO</button>
            <button onclick="switchTab('recharge')" id="tab-recharge" class="pb-4 px-4 font-bold text-green-400">شحن رصيد</button>
        </div>

        <!-- Section: Services -->
        <div id="services-grid" class="p-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- الخدمات تظهر هنا بشكل احترافي -->
        </div>

        <!-- Section: Recharge -->
        <div id="recharge-section" class="hidden p-6 max-w-xl mx-auto">
            <div class="glass-card p-8 rounded-2xl border-yellow-500/50">
                <h3 class="text-2xl font-bold mb-4 text-yellow-400">شحن الرصيد (فودافون كاش)</h3>
                <p class="mb-6 text-gray-300">ارسل المبلغ إلى: <span class="text-white font-mono font-bold bg-gray-800 px-2 py-1 rounded">01112215950</span></p>
                <input id="recharge-amount" type="number" placeholder="المبلغ المبعوث" class="w-full bg-gray-800 border border-gray-700 p-3 rounded-lg mb-4">
                <input id="recharge-phone" type="text" placeholder="رقمك اللي بعت منه" class="w-full bg-gray-800 border border-gray-700 p-3 rounded-lg mb-6">
                <button onclick="submitRecharge()" class="w-full bg-green-600 hover:bg-green-700 py-3 rounded-lg font-bold transition">إرسال الطلب للأدمن</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendEmailVerification, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, addDoc, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB48E8FEkT2t_U9kUZYtWLJBxpCtMrAQZY",
            authDomain: "kimo-tecnology.firebaseapp.com",
            projectId: "kimo-tecnology",
            storageBucket: "kimo-tecnology.firebasestorage.app",
            messagingSenderId: "27878132504",
            appId: "1:27878132504:web:5559659d4a2342747cac6d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Login / Register Logic
        document.getElementById('login-btn').onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try {
                const userCred = await signInWithEmailAndPassword(auth, email, pass);
                if (!userCred.user.emailVerified && email !== "kareemwael0213@gmail.com") {
                    alert("يرجى تفعيل حسابك من خلال الرابط المرسل لإيميلك.");
                    await signOut(auth);
                }
            } catch (err) {
                if (err.code === 'auth/user-not-found') {
                    const newCust = await createUserWithEmailAndPassword(auth, email, pass);
                    await sendEmailVerification(newCust.user);
                    alert("تم إنشاء حسابك! ارسلنا لك رابط تفعيل على الإيميل.");
                } else {
                    alert("خطأ: " + err.message);
                }
            }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user && (user.emailVerified || user.email === "kareemwael0213@gmail.com")) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                document.getElementById('user-balance').classList.remove('hidden');
                document.getElementById('logout-btn').classList.remove('hidden');
                
                if (user.email === "kareemwael0213@gmail.com") {
                    document.getElementById('admin-panel').classList.remove('hidden');
                    loadAdminOrders();
                }
                loadServices('kimosmm');
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('main-content').classList.add('hidden');
            }
        });

        document.getElementById('logout-btn').onclick = () => signOut(auth);

        // UI Tabs Switcher
        window.switchTab = (tab) => {
            const categories = ['kimosmm', 'priemerkimo', 'videokimo', 'recharge'];
            categories.forEach(c => document.getElementById(`tab-${c}`).classList.remove('active-tab'));
            document.getElementById(`tab-${tab}`).classList.add('active-tab');
            
            if (tab === 'recharge') {
                document.getElementById('services-grid').classList.add('hidden');
                document.getElementById('recharge-section').classList.remove('hidden');
            } else {
                document.getElementById('services-grid').classList.remove('hidden');
                document.getElementById('recharge-section').classList.add('hidden');
                loadServices(tab);
            }
        };

        async function loadServices(cat) {
            const q = query(collection(db, "services"), where("category", "==", cat));
            onSnapshot(q, (snap) => {
                const grid = document.getElementById('services-grid');
                grid.innerHTML = '';
                snap.forEach(d => {
                    const s = d.data();
                    grid.innerHTML += `
                        <div class="glass-card p-6 rounded-2xl hover:scale-105 transition border border-gray-700">
                            <h4 class="text-xl font-bold mb-2">${s.name}</h4>
                            <p class="text-yellow-400 text-2xl font-mono mb-4">${s.price}$</p>
                            <button onclick="placeOrder('${d.id}', '${s.name}')" class="w-full bg-blue-600 hover:bg-blue-700 py-2 rounded-lg font-bold">اطلب الآن</button>
                        </div>`;
                });
            });
        }

        async function loadAdminOrders() {
            onSnapshot(collection(db, "recharge_requests"), (snap) => {
                const list = document.getElementById('admin-orders-list');
                list.innerHTML = '';
                snap.forEach(d => {
                    const r = d.data();
                    list.innerHTML += `
                        <div class="bg-gray-800 p-4 rounded-lg flex justify-between items-center border-l-4 border-yellow-500">
                            <div>
                                <p class="text-sm text-gray-400">${r.email}</p>
                                <p class="font-bold">المبلغ: ${r.amount} | الرقم: ${r.num}</p>
                            </div>
                            <span class="text-xs bg-yellow-500 text-black px-2 py-1 rounded">قيد الانتظار</span>
                        </div>`;
                });
            });
        }
    </script>
</body>
</html>
