<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kimo Technology | كيمو تكنولوجي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background: #0f172a; overflow-x: hidden; }
        .hidden { display: none; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .active-tab { border-bottom: 4px solid #facc15; color: #facc15; text-shadow: 0 0 10px rgba(250, 204, 21, 0.5); }
        .service-card:hover { transform: translateY(-10px); border-color: #facc15; box-shadow: 0 10px 30px -10px rgba(250, 204, 21, 0.3); }
        .modal-bg { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(5px); }
    </style>
</head>
<body class="text-gray-100">

    <!-- Header -->
    <nav class="p-5 bg-[#1e293b]/50 backdrop-blur-xl sticky top-0 z-50 flex justify-between items-center border-b border-white/10">
        <div class="flex items-center gap-3">
            <div class="p-2 bg-yellow-400 rounded-lg text-black rotate-12"><i class="fas fa-rocket"></i></div>
            <h1 class="text-2xl font-black tracking-widest uppercase">KIMO <span class="text-yellow-400">TECH</span></h1>
        </div>
        <div id="auth-status" class="flex items-center gap-4">
            <div id="balance-box" class="hidden bg-white/5 px-4 py-2 rounded-xl border border-white/10">
                <span class="text-xs text-gray-400 block">رصيدك</span>
                <span id="user-balance" class="text-green-400 font-bold">0.00$</span>
            </div>
            <button id="logout-btn" class="hidden hover:text-red-400 transition"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </nav>

    <!-- Auth Section -->
    <div id="auth-section" class="max-w-md mx-auto mt-24 p-10 glass rounded-3xl shadow-2xl">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-black text-yellow-400">أهلاً بك يا بطل</h2>
            <p class="text-gray-500 text-sm mt-2">سجل دخولك لبدء استخدام خدمات كيمو</p>
        </div>
        <button id="google-btn" class="w-full bg-white text-black font-bold py-4 rounded-2xl mb-6 flex items-center justify-center gap-3 hover:scale-[1.02] transition active:scale-95">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="22"> الدخول بواسطة Google
        </button>
        <div class="flex items-center mb-6"><div class="flex-grow border-t border-white/10"></div><span class="px-4 text-xs text-gray-500 italic">OR</span><div class="flex-grow border-t border-white/10"></div></div>
        <input id="email" type="email" placeholder="البريد الإلكتروني" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl mb-4 outline-none focus:border-yellow-400 transition">
        <input id="password" type="password" placeholder="كلمة المرور" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl mb-8 outline-none focus:border-yellow-400 transition">
        <button id="email-login-btn" class="w-full bg-yellow-400 hover:bg-yellow-500 text-black font-black py-4 rounded-2xl shadow-xl shadow-yellow-400/20 transition">دخول آمن</button>
    </div>

    <!-- Main Content -->
    <div id="main-content" class="hidden">
        <!-- Admin Add Service -->
        <div id="admin-panel" class="hidden p-6 bg-yellow-400/5 border-b border-yellow-400/20 mb-8">
            <div class="max-w-7xl mx-auto flex flex-wrap gap-4 items-center">
                <span class="bg-yellow-400 text-black px-3 py-1 rounded font-bold text-xs">ADMIN</span>
                <input id="new-service-name" type="text" placeholder="اسم الخدمة" class="bg-gray-800 p-3 rounded-xl border border-gray-700 outline-none focus:border-yellow-400">
                <input id="new-service-price" type="number" step="0.01" placeholder="السعر $" class="bg-gray-800 p-3 rounded-xl border border-gray-700 w-24">
                <input id="new-service-api-id" type="number" placeholder="API Service ID" class="bg-gray-800 p-3 rounded-xl border border-gray-700 w-32">
                <select id="new-service-cat" class="bg-gray-800 p-3 rounded-xl border border-gray-700">
                    <option value="kimosmm">KIMO SMM</option>
                    <option value="priemerkimo">PREMIUM</option>
                    <option value="videokimo">VIDEO</option>
                </select>
                <button onclick="addNewService()" class="bg-white text-black px-8 py-3 rounded-xl font-bold hover:bg-yellow-400 transition">إضافة الخدمة</button>
            </div>
        </div>

        <!-- Navigation Tabs -->
        <div class="flex justify-center gap-8 mb-12 border-b border-white/5 sticky top-[80px] bg-[#0f172a] z-40">
            <button onclick="switchTab('kimosmm')" id="tab-kimosmm" class="pb-4 px-2 font-bold active-tab transition-all">الرشق SMM</button>
            <button onclick="switchTab('priemerkimo')" id="tab-priemerkimo" class="pb-4 px-2 font-bold text-gray-500">حسابات Premium</button>
            <button onclick="switchTab('videokimo')" id="tab-videokimo" class="pb-4 px-2 font-bold text-gray-500">فيديوهات KIMO</button>
            <button onclick="switchTab('recharge')" id="tab-recharge" class="pb-4 px-2 font-bold text-green-500">شحن الرصيد</button>
        </div>

        <!-- Dynamic Grid -->
        <div id="services-grid" class="p-6 grid grid-cols-1 md:grid-cols-3 xl:grid-cols-4 gap-8 max-w-7xl mx-auto"></div>

        <!-- Recharge Section -->
        <div id="recharge-section" class="hidden p-6 max-w-2xl mx-auto">
            <div class="glass p-10 rounded-[2rem] text-center border-t-8 border-yellow-400">
                <h3 class="text-3xl font-black text-yellow-400 mb-4">شحن المحفظة</h3>
                <p class="text-gray-400 mb-8 leading-relaxed">حوّل المبلغ فودافون كاش على الرقم بالأسفل. <br> سعر الدولار لدينا: <span class="text-white font-bold">54.00 EGP</span></p>
                <div class="bg-black/40 p-5 rounded-2xl mb-8 flex justify-between items-center border border-white/5">
                    <span class="text-2xl font-mono font-bold tracking-tighter">01112215950</span>
                    <button class="text-yellow-400"><i class="fas fa-copy"></i></button>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                    <input id="recharge-phone" type="text" placeholder="رقم التحويل" class="bg-white/5 p-4 rounded-xl outline-none border border-white/10 focus:border-yellow-400">
                    <input id="recharge-egy" type="number" placeholder="المبلغ بالمصري" class="bg-white/5 p-4 rounded-xl outline-none border border-white/10 focus:border-yellow-400">
                </div>
                <button onclick="submitRecharge()" class="w-full bg-green-600 hover:bg-green-700 py-4 rounded-2xl font-black shadow-lg shadow-green-900/40 transition">تأكيد عملية التحويل</button>
            </div>
        </div>
    </div>

    <!-- Order Modal -->
    <div id="order-modal" class="hidden fixed inset-0 z-[100] modal-bg flex items-center justify-center p-4">
        <div class="glass max-w-md w-full p-8 rounded-3xl shadow-2xl relative">
            <button onclick="closeModal()" class="absolute top-4 left-4 text-gray-500 hover:text-white"><i class="fas fa-times"></i></button>
            <h3 id="modal-service-name" class="text-2xl font-black text-yellow-400 mb-2">اسم الخدمة</h3>
            <p class="text-gray-400 text-sm mb-6">أدخل البيانات المطلوبة لإتمام طلبك</p>
            
            <label class="block text-xs font-bold text-gray-500 mb-2 uppercase">رابط الحساب / البوست</label>
            <input id="order-link" type="text" placeholder="https://..." class="w-full bg-white/5 p-4 rounded-xl mb-4 border border-white/10 outline-none focus:border-yellow-400">
            
            <label class="block text-xs font-bold text-gray-500 mb-2 uppercase">الكمية المطلوبة</label>
            <input id="order-quantity" type="number" oninput="calculateTotal()" placeholder="1000" class="w-full bg-white/5 p-4 rounded-xl mb-6 border border-white/10 outline-none focus:border-yellow-400">
            
            <div class="bg-yellow-400/10 p-4 rounded-xl mb-8 flex justify-between items-center border border-yellow-400/20">
                <span class="text-gray-400 font-bold">الإجمالي:</span>
                <span id="modal-total-cost" class="text-xl font-black text-yellow-400">0.00$</span>
            </div>
            
            <button id="confirm-order-btn" class="w-full bg-yellow-400 text-black py-4 rounded-2xl font-black hover:bg-yellow-500 transition shadow-xl shadow-yellow-400/10">تأكيد الطلب الآن</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, addDoc, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB48E8FEkT2t_U9kUZYtWLJBxpCtMrAQZY",
            authDomain: "kimo-tecnology.firebaseapp.com",
            projectId: "kimo-tecnology",
            storageBucket: "kimo-tecnology.firebasestorage.app",
            messagingSenderId: "27878132504",
            appId: "1:27878132504:web:5559659d4a2342747cac6d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();
        
        const RATE = 54;
        const ADMIN = "kareemwael0213@gmail.com";
        const SHARK_API_KEY = "91bda800790531f970ca22fe776e2aa6";
        let currentService = null;

        // Auth Logic
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                document.getElementById('logout-btn').classList.remove('hidden');
                document.getElementById('balance-box').classList.remove('hidden');
                if (user.email === ADMIN) document.getElementById('admin-panel').classList.remove('hidden');
                loadBalance();
                switchTab('kimosmm');
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('main-content').classList.add('hidden');
            }
        });

        document.getElementById('google-btn').onclick = () => signInWithPopup(auth, googleProvider);
        document.getElementById('logout-btn').onclick = () => signOut(auth);

        // Tab Switching
        window.switchTab = (tab) => {
            ['kimosmm', 'priemerkimo', 'videokimo', 'recharge'].forEach(t => document.getElementById(`tab-${t}`).classList.remove('active-tab'));
            document.getElementById(`tab-${tab}`).classList.add('active-tab');
            document.getElementById('services-grid').classList.toggle('hidden', tab === 'recharge');
            document.getElementById('recharge-section').classList.toggle('hidden', tab !== 'recharge');
            if (tab !== 'recharge') loadServices(tab);
        };

        // Load Services
        async function loadServices(cat) {
            const q = query(collection(db, "services"), where("category", "==", cat));
            onSnapshot(q, (snap) => {
                const grid = document.getElementById('services-grid');
                grid.innerHTML = '';
                snap.forEach(d => {
                    const s = d.data();
                    grid.innerHTML += `
                        <div class="glass p-8 rounded-[2rem] service-card transition-all duration-500 relative overflow-hidden group">
                            <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-100 transition"><i class="fas fa-bolt text-yellow-400"></i></div>
                            <h4 class="text-xl font-black mb-4 h-14 overflow-hidden">${s.name}</h4>
                            <div class="flex items-baseline gap-2 mb-8">
                                <span class="text-3xl font-black text-yellow-400">${s.price}$</span>
                                <span class="text-gray-500 text-xs font-bold">لكل 1000</span>
                            </div>
                            <button onclick="openOrderModal('${d.id}', '${s.name}', ${s.price}, ${s.api_id})" class="w-full bg-white/5 py-4 rounded-2xl font-bold border border-white/10 group-hover:bg-yellow-400 group-hover:text-black transition-all">اطلب الخدمة</button>
                        </div>`;
                });
            });
        }

        // Modal Logic
        window.openOrderModal = (id, name, price, apiId) => {
            currentService = { id, name, price, apiId };
            document.getElementById('modal-service-name').innerText = name;
            document.getElementById('order-modal').classList.remove('hidden');
        };

        window.closeModal = () => document.getElementById('order-modal').classList.add('hidden');

        window.calculateTotal = () => {
            const qty = document.getElementById('order-quantity').value;
            const total = (qty / 1000) * currentService.price;
            document.getElementById('modal-total-cost').innerText = total.toFixed(2) + "$";
        };

        // Admin: Add Service
        window.addNewService = async () => {
            const name = document.getElementById('new-service-name').value;
            const price = parseFloat(document.getElementById('new-service-price').value);
            const api_id = document.getElementById('new-service-api-id').value;
            const category = document.getElementById('new-service-cat').value;
            if(!name || !price || !api_id) return alert("كمل البيانات يا كيمو!");
            await addDoc(collection(db, "services"), { name, price, api_id, category });
            alert("تمت الإضافة بنجاح!");
        };

        // Final Order Execution (API Call Placeholder)
        document.getElementById('confirm-order-btn').onclick = async () => {
            const link = document.getElementById('order-link').value;
            const qty = document.getElementById('order-quantity').value;
            if(!link || !qty) return alert("دخل البيانات كاملة!");
            
            // هنا بيتم الخصم من Firestore الأول وبعدين نداء الـ API
            alert(`جاري معالجة طلبك للخدمة رقم ${currentService.apiId} بالكمية ${qty}...`);
            closeModal();
        };

        async function loadBalance() {
            // محاكاة سريعة للرصيد، المفروض تجيبها من الـ Firestore بتاع اليوزر
            document.getElementById('user-balance').innerText = "15.50$";
        }
    </script>
</body>
</html>
